<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chappystick</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
          "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js",
          "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
          "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
          "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
        }
      }
    </script>
    <link rel="stylesheet" href="/style.css" />
    <script src="/main.js" type="module"></script>
  </head>
  <body>
    <div id="app">Loading…</div>
    <template id="template-app">
      <div class="app">
        <div v-if="$graffitiSession.value === undefined" class="auth-screen">
          <div class="auth-card">
            <h1 class="auth-title">Chappystick</h1>
            <p class="auth-sub">Loading…</p>
          </div>
        </div>

        <div v-else-if="$graffitiSession.value === null" class="auth-screen">
          <div class="auth-card">
            <h1 class="auth-title">Chappystick</h1>
            <p class="auth-sub">Team chat on Graffiti</p>
            <button
              type="button"
              class="btn btn-primary"
              @click="$graffiti.login()"
            >
              Log in
            </button>
          </div>
        </div>

        <div v-else class="layout">
          <aside class="sidebar">
            <router-link class="sidebar-brand sidebar-brand-link" to="/">
              <span class="sidebar-logo">◆</span>
              <div>
                <div class="sidebar-name">Chappystick</div>
              </div>
            </router-link>

            <div class="sidebar-section">
              <label class="field-label">New team</label>
              <form class="stack-form" @submit.prevent="newChat()">
                <input
                  class="input"
                  type="text"
                  v-model="newChatName"
                  placeholder="Team name"
                  autocomplete="off"
                />
                <button
                  type="submit"
                  class="btn btn-secondary btn-block"
                  :disabled="!newChatName || isCreating"
                >
                  {{ isCreating ? "Creating…" : "Create team" }}
                </button>
              </form>
            </div>

            <div class="sidebar-section">
              <label class="field-label">Join with team id</label>
              <form class="stack-form" @submit.prevent="joinTeam()">
                <input
                  class="input input-mono"
                  type="text"
                  v-model="teamCode"
                  placeholder="UUID join code"
                  autocomplete="off"
                />
                <button
                  type="submit"
                  class="btn btn-ghost btn-block"
                  :disabled="!teamCode.trim() || isJoining"
                >
                  {{ isJoining ? "Joining…" : "Join team" }}
                </button>
              </form>
              <p v-if="joinError" class="field-error">{{ joinError }}</p>
            </div>

            <div class="sidebar-section sidebar-section-grow">
              <div class="field-label row-between">
                <span>Your teams</span>
              </div>
              <p v-if="teamsListLoading" class="sidebar-empty">
                Loading your teams…
              </p>
              <p v-else-if="!mergedTeams.length" class="sidebar-empty">
                No teams yet. Create one or copy in a join code.
              </p>
              <nav class="team-nav" v-else>
                <div
                  v-for="t in mergedTeams"
                  :key="t.channel"
                  class="team-nav-row"
                >
                  <router-link
                    class="team-nav-item"
                    :class="{ active: t.channel === activeChatId }"
                    :to="{ name: 'chat', params: { chatID: t.channel } }"
                  >
                    <span class="team-nav-title">{{ t.title }}</span>
                    <span class="team-nav-meta"
                      >{{ t.channel.slice(0, 8) }}…</span
                    >
                  </router-link>
                  <button
                    type="button"
                    class="team-leave-btn"
                    :disabled="leavingTeamChannel === t.channel"
                    title="Leave team"
                    @click.stop="leaveTeam(t.channel)"
                  >
                    {{ leavingTeamChannel === t.channel ? "…" : "Leave" }}
                  </button>
                </div>
              </nav>
            </div>

            <div class="sidebar-footer">
              <button
                type="button"
                class="btn btn-ghost btn-block"
                @click="$graffiti.logout($graffitiSession.value)"
              >
                Log out
              </button>
            </div>
          </aside>

          <main class="main">
            <router-view />
          </main>
        </div>
      </div>
    </template>
  </body>
</html>
